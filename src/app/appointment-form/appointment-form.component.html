<form class="form-body" (ngSubmit)="onSubmit()">
  <div class="form-floating mb-3">
    <input type="text" class="form-control border-primary" placeholder="Appointee's Name"
      [(ngModel)]="name" name="name">
    <label>Name of Group</label>
  </div>

  <div class="form-floating mb-3">
    <input type="text" class="form-control border-primary" placeholder="Project Name"
      [(ngModel)]="purpose" name="purpose">
    <label>Project Name</label>
  </div>

  <div class="mb-3">
    <label class="form-label">Date</label>
    <input type="date" class="form-control border-primary" [(ngModel)]="date" name="date">
  </div>

  <div class="mb-3">
    <label class="form-label">Time</label>
    <input type="time" class="form-control border-primary" [(ngModel)]="time" name="time">
  </div>

  <div class="mb-3">
    <label class="form-label">Status</label>
    <select class="form-control border-primary" [(ngModel)]="status" name="status">
      <option>Pending</option>
      <option>Completed</option>
      <option>Cancelled</option>
    </select>
  </div>

  <input type="submit" class="btn" id="submit" value="Schedule Project">
</form>

<!-- Toast Notification -->
<div *ngIf="showToast" [@fade] class="toast-container">
  <div [class]="toastType === 'success' ? 'toast-success' : 'toast-error'">
    {{ toastMessage }}
  </div>
</div>
