<div class="register-wrapper">
  <div class="register-card">
    <h2>Create Account</h2>
    <p class="subtitle">Register to start managing appointments.</p>

    <form (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="form-control" [(ngModel)]="username" name="username">
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" [(ngModel)]="email" name="email">
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" [(ngModel)]="password" name="password">
      </div>

      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" [(ngModel)]="confirmPassword" name="confirmPassword">
      </div>

      <div *ngIf="error" class="alert alert-danger py-1">{{ error }}</div>
      <div *ngIf="success" class="alert alert-success py-1">{{ success }}</div>

      <button class="btn btn-primary w-100 mt-2" type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Registering...' : 'Register' }}
      </button>
    </form>

    <div class="bottom-text">
      Already have an account?
      <a routerLink="/login">Login here</a>
    </div>
  </div>
</div>
